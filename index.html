<!doctype html><form id=f><input id=n placeholder=Name><input id=e placeholder=Email><button>Join</button></form><script>f.onsubmit=async(ev)=>{ev.preventDefault();let r=await fetch('/api/waitlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n.value,email:e.value})});alert(r.ok?'Thanks!':'Error')}</script>
